<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--forge-bg);font-family:var(--font-body);color:var(--forge-text)}
.line{margin-bottom:8px}
</style>
</head>
<body>
<div class="line" style="font-size:14.5px;font-weight:500">Input text — 14.5px / 500</div>
<div class="line" style="font-size:14px;font-weight:600">List item text — 14px / 600</div>
<div class="line" style="font-size:13.5px;font-weight:600;color:var(--forge-text-muted)">Body secondary — 13.5px / 600</div>
<div class="line" style="font-size:12.5px;font-weight:700">Chip / filter — 12.5px / 700</div>
<div class="line" style="font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--forge-text-faint)">Label — 11.5px / 700 uppercase</div>
<div class="line" style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--forge-text-faint)">Mini-label — 10.5px / 700 uppercase</div>
</body>
</html>
