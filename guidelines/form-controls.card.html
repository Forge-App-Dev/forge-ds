<!-- @dsCard group="Components" viewport="700x520" name="Form Controls" subtitle="Switch, Stepper, ListItem, SearchField, Select" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--forge-bg);font-family:var(--forge-font-body);color:var(--forge-text);}
  h3{font-size:11px;text-transform:uppercase;letter-spacing:var(--forge-tracking-label);color:var(--forge-text-faint);margin:16px 0 8px;font-weight:700;}
  h3:first-child{margin-top:0;}
  .box{max-width:320px;}
  .sw{width:44px;height:26px;border-radius:999px;background:var(--forge-accent);border:1px solid var(--forge-accent);display:inline-flex;align-items:center;padding:2px;box-sizing:border-box;}
  .sw .k{width:20px;height:20px;border-radius:999px;background:var(--forge-on-accent);transform:translateX(18px);}
  .sw.off{background:var(--forge-surface-raised);border-color:var(--forge-border-input);}
  .sw.off .k{transform:translateX(0);background:var(--forge-text-faint);}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:44px;}
  .step{display:inline-flex;align-items:center;gap:10px;}
  .sbtn{width:40px;height:40px;border-radius:var(--forge-radius-input);border:1px solid var(--forge-border-input);background:var(--forge-surface-raised);color:var(--forge-text);display:inline-flex;align-items:center;justify-content:center;}
  .sval{min-width:48px;text-align:center;font-family:var(--forge-font-title);font-weight:700;font-size:20px;}
  .li{display:flex;align-items:center;gap:12px;min-height:44px;padding:10px 2px;}
  .tile{width:34px;height:34px;border-radius:var(--forge-radius-chip);background:var(--forge-surface-raised);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .litext{flex:1;display:flex;flex-direction:column;gap:2px;}
  .lit{font-weight:600;font-size:var(--forge-text-list-item);}
  .lis{font-size:var(--forge-text-chip);color:var(--forge-text-dim);}
  .field{display:flex;align-items:center;gap:8px;height:44px;padding-inline:12px;border-radius:var(--forge-radius-input);border:1px solid var(--forge-border-input);background:var(--forge-surface-raised);}
  .field input{flex:1;background:none;border:none;outline:none;color:var(--forge-text);font-family:var(--forge-font-body);font-size:var(--forge-text-input);}
  .sel{width:100%;height:44px;padding-inline:12px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--forge-radius-input);border:1px solid var(--forge-border-input);background:var(--forge-surface-raised);color:var(--forge-text);font-family:var(--forge-font-body);font-size:var(--forge-text-input);}
  svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .muted{color:var(--forge-text-dim);}
</style>
</head>
<body>
  <div class="box">
    <h3>Switch (role=switch)</h3>
    <div class="row"><span>Usar kg</span><span class="sw"><span class="k"></span></span></div>
    <div class="row"><span>Notificações</span><span class="sw off"><span class="k"></span></span></div>

    <h3>Stepper (+/- com botões reais)</h3>
    <div class="step">
      <button class="sbtn"><svg width="18" height="18" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <span class="sval">12</span>
      <button class="sbtn"><svg width="18" height="18" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    </div>

    <h3>ListItem</h3>
    <div class="li">
      <span class="tile muted"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>
      <span class="litext"><span class="lit">Supino reto</span><span class="lis">4 × 8 · 60kg</span></span>
      <svg width="18" height="18" viewBox="0 0 24 24" class="muted"><polyline points="9 6 15 12 9 18"/></svg>
    </div>

    <h3>SearchField</h3>
    <div class="field">
      <svg width="18" height="18" viewBox="0 0 24 24" class="muted"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      <input value="frango" />
      <svg width="16" height="16" viewBox="0 0 24 24" class="muted"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
    </div>

    <h3>Select (abre Panel de opções)</h3>
    <div class="sel"><span>Iniciante</span><svg width="18" height="18" viewBox="0 0 24 24" class="muted"><polyline points="6 9 12 15 18 9"/></svg></div>
  </div>
</body>
</html>
