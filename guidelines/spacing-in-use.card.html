<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale in use" subtitle="Screen padding, card padding, list gaps" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--forge-bg);font-family:var(--font-body)}
.screen{padding:var(--space-screen-h);background:var(--forge-bg)}
.card{background:var(--forge-surface);border:1px solid var(--forge-border);border-radius:var(--radius-card);padding:var(--space-card);margin-bottom:var(--space-gap);color:var(--forge-text-muted);font-size:12px}
</style>
</head>
<body>
<div class="screen">
  <div class="card">space-screen-h 20px · space-card 16px padding</div>
  <div class="card">space-gap 10px margin-bottom between cards</div>
</div>
</body>
</html>
