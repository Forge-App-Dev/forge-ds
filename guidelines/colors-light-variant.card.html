<!-- @dsCard group="Colors" viewport="700x140" name="Light Theme Variant" subtitle="Sibling-app pattern: same components, surfaces + accent swapped" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;font-family:var(--font-body)}
.panel{border-radius:var(--radius-card);border:1px solid var(--forge-border);padding:18px;background:var(--forge-surface)}
.title{font-family:var(--font-title);text-transform:uppercase;font-size:22px;color:var(--forge-text);letter-spacing:.5px}
.sub{color:var(--forge-text-dim);font-size:13px;margin-top:4px}
</style>
</head>
<body class="forge-theme-light" style="background:var(--forge-bg)">
<div class="panel">
  <div class="title"><span style="color:var(--forge-accent)">F</span>uel</div>
  <div class="sub">Same radii, type and spacing — only surfaces + accent change (accent → green here).</div>
</div>
</body>
</html>
