<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--forge-bg);font-family:var(--font-body)}
.row{display:flex;gap:10px}
.sw{flex:1;height:80px;border-radius:10px;border:1px solid var(--forge-border);display:flex;align-items:flex-end;padding:8px;box-sizing:border-box}
.lbl{color:#fff;font-size:11px;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.5)}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--forge-bg)"><span class="lbl">bg</span></div>
  <div class="sw" style="background:var(--forge-surface)"><span class="lbl">surface</span></div>
  <div class="sw" style="background:var(--forge-surface-raised)"><span class="lbl">surfaceRaised</span></div>
  <div class="sw" style="background:var(--forge-panel)"><span class="lbl">panel</span></div>
  <div class="sw" style="background:var(--forge-border)"><span class="lbl">border</span></div>
</div>
</body>
</html>
