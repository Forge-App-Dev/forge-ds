<!-- @dsCard group="Brand" viewport="700x220" name="Press & Disabled States" subtitle="Opacity dim on press (~0.85), disabled ~0.5 — no color-shift, no scale" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--forge-bg);font-family:var(--forge-font-body);color:var(--forge-text);}
  .row{display:flex;gap:14px;align-items:flex-start;}
  .col{display:flex;flex-direction:column;align-items:center;}
  .lbl{color:var(--forge-text-dim);font-size:11px;margin-top:6px;text-align:center;}
  .btn{height:var(--forge-size-control-lg);padding-inline:18px;border-radius:var(--forge-radius-button);border:none;background:var(--forge-accent);color:var(--forge-on-accent);font-family:var(--forge-font-body);font-weight:800;font-size:15px;display:inline-flex;align-items:center;}
  .press{opacity:var(--forge-opacity-press);}
  .dis{opacity:var(--forge-opacity-disabled);}
</style>
</head>
<body>
<div class="row">
  <div class="col"><span class="btn">Normal</span><div class="lbl">default</div></div>
  <div class="col"><span class="btn press">Pressionado</span><div class="lbl">press (opacity 0.85)</div></div>
  <div class="col"><span class="btn dis">Desabilitado</span><div class="lbl">disabled (opacity 0.5)</div></div>
</div>
</body>
</html>
