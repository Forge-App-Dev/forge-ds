<!-- @dsCard group="Components" viewport="760x480" name="Onboarding Pager" subtitle="Pager + PageDots — máx 3 telas, pular sempre visível, última tela = 1 CTA" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--forge-bg);font-family:var(--forge-font-body);color:var(--forge-text);}
  h3{font-size:11px;text-transform:uppercase;letter-spacing:var(--forge-tracking-label);color:var(--forge-text-faint);margin:0 0 10px;font-weight:700;}
  .row{display:flex;gap:20px;flex-wrap:wrap;}
  .phone{width:320px;height:420px;border:1px solid var(--forge-border);border-radius:var(--forge-radius-panel);background:var(--forge-bg);display:flex;flex-direction:column;overflow:hidden;}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;gap:14px;}
  .art{width:96px;height:96px;border-radius:999px;background:var(--forge-surface-raised);display:flex;align-items:center;justify-content:center;}
  .ttl{font-family:var(--forge-font-title);font-weight:700;text-transform:uppercase;letter-spacing:var(--forge-tracking-title);font-size:22px;line-height:24px;}
  .desc{font-size:var(--forge-text-body);color:var(--forge-text-dim);line-height:var(--forge-lh-body);max-width:240px;}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 20px;}
  .side{min-width:64px;display:flex;}
  .side.r{justify-content:flex-end;}
  .dots{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:6px;height:6px;border-radius:999px;background:var(--forge-text-dimmer);}
  .dot.on{width:18px;background:var(--forge-accent);}
  .btn{height:44px;padding-inline:16px;border-radius:var(--forge-radius-button);border:none;background:var(--forge-accent);color:var(--forge-on-accent);font-family:var(--forge-font-body);font-weight:800;font-size:14px;display:inline-flex;align-items:center;gap:7px;}
  .ghost{background:none;color:var(--forge-text-muted);font-weight:800;height:44px;padding-inline:8px;border:none;font-family:var(--forge-font-body);font-size:14px;}
  svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>
<div class="row">
  <div>
    <h3>Tela intermediária — Pular + Próximo</h3>
    <div class="phone">
      <div class="stage">
        <div class="art"><svg width="44" height="44" viewBox="0 0 24 24" style="color:var(--forge-accent)"><path d="M6.5 6.5h11v11h-11z"/><path d="M3 9h3M3 15h3M18 9h3M18 15h3"/></svg></div>
        <div class="ttl">Registre cada série</div>
        <div class="desc">Peso, reps e descanso num toque. O app lembra do resto pra você focar no treino.</div>
      </div>
      <div class="foot">
        <div class="side"><button class="ghost">Pular</button></div>
        <div class="dots"><span class="dot"></span><span class="dot on"></span><span class="dot"></span></div>
        <div class="side r"><button class="btn">Próximo <svg width="16" height="16" viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button></div>
      </div>
    </div>
  </div>

  <div>
    <h3>Última tela — 1 CTA único (sem Pular)</h3>
    <div class="phone">
      <div class="stage">
        <div class="art"><svg width="44" height="44" viewBox="0 0 24 24" style="color:var(--forge-accent)"><path d="M7 4h10v3a5 5 0 0 1-10 0z"/><path d="M12 9v4M9 17h6M5 4H3v2a3 3 0 0 0 3 3M19 4h2v2a3 3 0 0 1-3 3"/></svg></div>
        <div class="ttl">Bora forjar</div>
        <div class="desc">Tudo pronto. Seu primeiro treino te espera.</div>
      </div>
      <div class="foot">
        <div class="side"></div>
        <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot on"></span></div>
        <div class="side r"><button class="btn">Começar</button></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
