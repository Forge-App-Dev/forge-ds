<!-- @dsCard group="Brand" viewport="700x160" name="Loading motif" subtitle="Spinning ring + pulsing mark + animated dots (signature loading treatment)" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;background:var(--forge-bg);font-family:var(--font-body);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.86);opacity:.62}}
.ring-wrap{position:relative;width:72px;height:72px}
.ring-wrap svg{position:absolute;inset:0}
.spin{animation:spin 1s linear infinite}
.mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;animation:pulse 1.4s ease-in-out infinite}
.mark img{width:40px;height:40px}
.brand{font-family:var(--font-title);font-size:20px;text-transform:uppercase;color:var(--forge-text);letter-spacing:.5px}
</style>
</head>
<body>
<div class="ring-wrap">
  <svg width="72" height="72"><circle cx="36" cy="36" r="31" fill="none" stroke="var(--forge-border)" stroke-width="5"/></svg>
  <svg width="72" height="72" class="spin"><circle cx="36" cy="36" r="31" fill="none" stroke="var(--forge-accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="194.7" stroke-dashoffset="140"/></svg>
  <div class="mark"><img src="../assets/forge-mark.svg"></div>
</div>
<div class="brand"><span style="color:var(--forge-accent)">F</span>orge</div>
<div style="color:var(--forge-text-dimmer);font-size:12px">preparando martelo e bigorna…</div>
</body>
</html>
