<!-- @dsCard group="Colors" viewport="700x160" name="Brand & Semantic" subtitle="Accent (Forge red), success, warning, danger" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--forge-bg);font-family:var(--font-body)}
.row{display:flex;gap:10px}
.sw{flex:1;height:80px;border-radius:10px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box}
.lbl{font-size:11px;font-weight:700}
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--forge-accent)"><span class="lbl" style="color:#fff">accent</span></div>
  <div class="sw" style="background:var(--forge-success)"><span class="lbl" style="color:#0B0F19">success</span></div>
  <div class="sw" style="background:var(--forge-warning)"><span class="lbl" style="color:#0B0F19">warning</span></div>
  <div class="sw" style="background:var(--forge-danger)"><span class="lbl" style="color:#0B0F19">danger</span></div>
  <div class="sw" style="background:var(--forge-nutrition)"><span class="lbl" style="color:#0B0F19">nutrition</span></div>
</div>
</body>
</html>
