<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--forge-bg);font-family:var(--forge-font-body);display:flex;gap:14px}
.card{flex:1;background:var(--forge-surface);border:1px solid var(--forge-border);border-radius:14px;padding:18px;display:flex;align-items:center;gap:12px}
.dot{width:34px;height:34px;border-radius:8px;background:var(--forge-surface-raised);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.t{color:var(--forge-text-faint);font-weight:600;font-size:15px}
.s{color:var(--forge-text-dim);font-size:12px;margin-top:3px;line-height:16px}
</style>
</head>
<body>
<div class="card">
  <div class="dot">☾</div>
  <div>
    <div class="t">Descanso</div>
    <div class="s">Recuperação também é treino.</div>
  </div>
</div>
<div class="card">
  <div class="dot">◇</div>
  <div>
    <div class="t">Nenhum alimento registrado ainda</div>
    <div class="s">Toque em "+" para adicionar sua primeira refeição.</div>
  </div>
</div>
</body>
</html>
