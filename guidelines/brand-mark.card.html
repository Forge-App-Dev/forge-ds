<!DOCTYPE html>
<html>
<head>

<style>body{margin:0;padding:20px;background:var(--forge-bg);font-family:var(--font-body);display:flex;gap:32px;align-items:center}

.lbl{color:var(--forge-text-faint);font-size:11px}

<body>
<div class="item"><img src="../assets/forge-mark.svg" style="width:26px;height:26px"><span class="lbl">header 26px</span></div>

<div class="item" style="flex-direction:row;gap:9px">
  <img src="../assets/forge-mark.svg" style="width:26px;height:26px">
  <span style="font-family:var(--font-title);font-size:22px;text-transform:uppercase;color:var(--forge-text);letter-spacing:.5px"><span style="color:var(--forge-accent)">F</span>orge</span>
