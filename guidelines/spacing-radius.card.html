<!-- @dsCard group="Spacing" viewport="700x180" name="Radius scale" subtitle="Cards 14, panels 18, inputs 10, buttons 11, chips 8, pill 999" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--forge-bg);font-family:var(--forge-font-body);display:flex;gap:14px;align-items:flex-end}
.box{background:var(--forge-surface-raised);border:1px solid var(--forge-border-input);display:flex;align-items:center;justify-content:center;color:var(--forge-text-muted);font-size:11px}
</style>
</head>
<body>
<div class="box" style="width:70px;height:70px;border-radius:var(--forge-radius-card)">card 14</div>
<div class="box" style="width:70px;height:70px;border-radius:var(--forge-radius-panel)">panel 18</div>
<div class="box" style="width:70px;height:70px;border-radius:var(--forge-radius-input)">input 10</div>
<div class="box" style="width:70px;height:70px;border-radius:var(--forge-radius-button)">button 11</div>
<div class="box" style="width:70px;height:70px;border-radius:var(--forge-radius-chip)">chip 8</div>
<div class="box" style="width:70px;height:40px;border-radius:var(--forge-radius-pill)">pill</div>
</body>
</html>
