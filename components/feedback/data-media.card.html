<!-- @dsCard group="Components" viewport="700x480" name="Data & Media Overlays" subtitle="TargetsCard, VideoModal, LoadingScreen" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);padding:20px;font-family:var(--forge-font-body);color:var(--forge-text);}
  h4{color:var(--forge-text-faint);font-size:10.5px;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin:0 0 8px;}
  section{margin-bottom:20px;}

  /* TargetsCard */
  .targets{background:var(--forge-surface);border:var(--forge-border-w) solid var(--forge-border);border-radius:var(--forge-radius-card);padding:16px;}
  .targets .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .targets .eyebrow{font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:1px;color:var(--forge-text-faint);}
  .targets .edit{background:none;border:none;color:var(--forge-success);font-weight:700;font-size:12px;cursor:pointer;padding:0;}
  .targets .stats{display:flex;justify-content:space-between;}
  .stat{text-align:center;}
  .stat .v{font-family:var(--forge-font-title);font-size:24px;}
  .stat .v small{font-size:12px;}
  .stat .l{font-size:11px;color:var(--forge-text-dim);margin-top:2px;}

  /* VideoModal (representative open state) */
  .video{background:var(--forge-scrim-heavy);border-radius:var(--forge-radius-card);overflow:hidden;}
  .video .bar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;}
  .video .ttl{color:var(--forge-text);font-family:var(--forge-font-title);font-size:18px;text-transform:uppercase;letter-spacing:var(--forge-tracking-title);}
  .video .close{background:none;border:none;color:var(--forge-text-muted);font-size:20px;cursor:pointer;}
  .video .stage{display:flex;align-items:center;justify-content:center;padding:0 18px 18px;}
  .video .frame{width:100%;max-width:480px;aspect-ratio:16 / 9;background:var(--forge-scrim-heavy);border:var(--forge-border-w) solid var(--forge-border);border-radius:var(--forge-radius-video);display:flex;align-items:center;justify-content:center;}
  .video .frame span{color:var(--forge-text-dimmer);font-family:var(--forge-font-body);font-size:13px;}

  /* LoadingScreen (representative) */
  .ls{background:var(--forge-bg);border:var(--forge-border-w) solid var(--forge-border);border-radius:var(--forge-radius-card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;}
  .ls-ring{position:relative;width:72px;height:72px;}
  .ls-ring svg{position:absolute;inset:0;}
  .ls-mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .ls-mark img{width:40px;height:40px;}
  .ls-word{font-family:var(--forge-font-title);font-size:20px;text-transform:uppercase;color:var(--forge-text);letter-spacing:0.5px;}
  .ls-word .i{color:var(--forge-accent);}
  .ls-cap{color:var(--forge-text-dimmer);font-family:var(--forge-font-body);font-size:12px;}
  @keyframes ls-spin{to{transform:rotate(360deg);}}
  @keyframes ls-pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(0.86);opacity:0.62;}}
  .ls-spin{animation:ls-spin 1s linear infinite;transform-origin:center;}
  .ls-pulse{animation:ls-pulse 1.4s ease-in-out infinite;}
  @media (prefers-reduced-motion: reduce){.ls-spin,.ls-pulse{animation:none;}}
</style>
</head>
<body>
<section>
  <h4>TargetsCard — metas diárias</h4>
  <div class="targets">
    <div class="head">
      <div class="eyebrow">Suas metas diárias</div>
      <button class="edit">Ajustar</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="v" style="color:var(--forge-text)">2400</div><div class="l">Kcal</div></div>
      <div class="stat"><div class="v" style="color:var(--forge-macro-protein)">150<small>g</small></div><div class="l">Proteína</div></div>
      <div class="stat"><div class="v" style="color:var(--forge-macro-carb)">260<small>g</small></div><div class="l">Carbo</div></div>
      <div class="stat"><div class="v" style="color:var(--forge-macro-fat)">70<small>g</small></div><div class="l">Gordura</div></div>
    </div>
  </div>
</section>

<section>
  <h4>VideoModal — overlay do exercício</h4>
  <div class="video">
    <div class="bar">
      <span class="ttl">Supino Reto</span>
      <button class="close" aria-label="Fechar">✕</button>
    </div>
    <div class="stage">
      <div class="frame"><span>▶ player do exercício aqui</span></div>
    </div>
  </div>
</section>

<section>
  <h4>LoadingScreen — boot/loading</h4>
  <div class="ls">
    <div class="ls-ring">
      <svg width="72" height="72"><circle cx="36" cy="36" r="31" fill="none" stroke="var(--forge-border)" stroke-width="5"/></svg>
      <svg width="72" height="72" class="ls-spin"><circle cx="36" cy="36" r="31" fill="none" stroke="var(--forge-accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="194.7" stroke-dashoffset="140"/></svg>
      <div class="ls-mark ls-pulse"><img src="../../assets/forge-mark.svg" alt=""></div>
    </div>
    <div class="ls-word"><span class="i">F</span>orge</div>
    <div class="ls-cap">preparando martelo e bigorna…</div>
  </div>
</section>
</body>
</html>
