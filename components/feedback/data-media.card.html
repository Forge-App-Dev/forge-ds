<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { TargetsCard, VideoModal, LoadingScreen, Button } = window.ForgeDesignSystem_7731a5;
function Demo() {
  const [video, setVideo] = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <TargetsCard kcal={2400} protein={150} carb={260} fat={70} accent="#10B981" onEdit={() => {}} />
      <div style={{ display: "flex", gap: 10 }}>
        <Button small title="Abrir VideoModal" onClick={() => setVideo(true)} />
        <Button small title="Ver LoadingScreen" onClick={() => setLoading(true)} />
      </div>
      <VideoModal visible={video} onClose={() => setVideo(false)} title="Supino Reto">
        <span style={{ color: "#666", fontFamily: "var(--font-body)", fontSize: 13 }}>▶ player do exercício aqui</span>
      </VideoModal>
      {loading ? (
        <div style={{ position: "fixed", inset: 0, zIndex: 90 }} onClick={() => setLoading(false)}>
          <LoadingScreen markSrc="../../assets/forge-mark.png" message="preparando martelo e bigorna…" />
        </div>
      ) : null}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
