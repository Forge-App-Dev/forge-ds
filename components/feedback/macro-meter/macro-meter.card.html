<!-- @dsCard group="Components" viewport="700x160" name="MacroMeter" subtitle="Macro progress bar — default + compact" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);padding:18px;font-family:var(--forge-font-body);color:var(--forge-text);}
  .wrap{max-width:340px;}
  .mm{margin-bottom:10px;}
  .mm .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .mm .lbl{display:flex;align-items:center;gap:6px;}
  .dot{width:8px;height:8px;border-radius:4px;display:inline-block;flex-shrink:0;}
  .name{color:var(--forge-text-muted);font-weight:600;font-size:12.5px;}
  .amt{color:var(--forge-text-dim);font-weight:600;font-size:12px;}
  .track{height:6px;border-radius:3px;background:var(--forge-surface-raised);overflow:hidden;}
  .fill{height:6px;border-radius:3px;}
  .compact{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .ctrack{flex:1;height:5px;border-radius:2.5px;background:var(--forge-surface-raised);overflow:hidden;}
  .cfill{height:5px;border-radius:2.5px;}
  .cval{color:var(--forge-text-dim);font-weight:600;font-size:11px;flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap">
  <!-- default: Proteína 92 / 150 g -->
  <div class="mm">
    <div class="head">
      <div class="lbl"><span class="dot" style="background:var(--forge-macro-protein)"></span><span class="name">Proteína</span></div>
      <span class="amt">92 / 150 g</span>
    </div>
    <div class="track" role="progressbar" aria-label="Proteína" aria-valuenow="92" aria-valuemin="0" aria-valuemax="150">
      <div class="fill" style="width:61.3%;background:var(--forge-macro-protein)"></div>
    </div>
  </div>

  <!-- compact: carb 45 / 70 -->
  <div class="compact">
    <span class="dot" style="background:var(--forge-macro-carb)"></span>
    <div class="ctrack" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="70">
      <div class="cfill" style="width:64.3%;background:var(--forge-macro-carb)"></div>
    </div>
    <span class="cval">45g</span>
  </div>
</div>
</body>
</html>
