<!-- @dsCard group="Components" viewport="700x140" name="MetaBar" subtitle="Compact progress bar — single value + segmented" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);padding:18px;font-family:var(--forge-font-body);color:var(--forge-text);}
  .wrap{max-width:340px;display:flex;flex-direction:column;gap:10px;}
  .track{height:6px;border-radius:3px;background:var(--forge-surface-raised);overflow:hidden;}
  .fill{height:6px;border-radius:3px;}
  .seg-track{display:flex;height:6px;border-radius:3px;background:var(--forge-surface-raised);overflow:hidden;}
</style>
</head>
<body>
<div class="wrap">
  <!-- single value 2100 / 2400 -->
  <div class="track" role="progressbar" aria-valuenow="2100" aria-valuemin="0" aria-valuemax="2400">
    <div class="fill" style="width:87.5%;background:var(--forge-nutrition)"></div>
  </div>
  <!-- segmented -->
  <div class="seg-track" role="img" aria-label="Distribuição por refeição">
    <div style="width:17.5%;background:var(--forge-macro-protein);border-right:var(--forge-border-w-strong) solid var(--forge-surface-raised)"></div>
    <div style="width:32.5%;background:var(--forge-macro-carb);border-right:var(--forge-border-w-strong) solid var(--forge-surface-raised)"></div>
    <div style="width:20%;background:var(--forge-macro-fat)"></div>
  </div>
</div>
</body>
</html>
