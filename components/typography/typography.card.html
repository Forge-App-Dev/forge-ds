<!-- @dsCard group="Components" viewport="700x260" name="Typography" subtitle="Title, Label, SectionLabel" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);padding:20px;font-family:var(--forge-font-body);color:var(--forge-text);}
  .col{display:flex;flex-direction:column;gap:4px;}
  .title{font-family:var(--forge-font-title);font-weight:700;text-transform:uppercase;letter-spacing:var(--forge-tracking-title);color:var(--forge-text);}
  .screen-title{font-size:var(--forge-text-screen-title);line-height:var(--forge-lh-screen-title);}
  .panel-title{font-size:var(--forge-text-panel-title);line-height:var(--forge-lh-panel-title);margin-top:8px;}
  .card-title{font-family:var(--forge-font-body);font-weight:700;text-transform:none;letter-spacing:0;font-size:var(--forge-text-card-title);line-height:var(--forge-lh-card-title);color:var(--forge-text);margin-top:8px;}
  .label{font-family:var(--forge-font-body);font-weight:700;font-size:var(--forge-text-label);text-transform:uppercase;letter-spacing:var(--forge-tracking-label);color:var(--forge-text-faint);}
  .label.email{margin-top:12px;}
  .section-label{margin-top:14px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="col">
  <div class="title screen-title">Hoje</div>
  <div class="title panel-title">Editar plano</div>
  <div class="card-title">Supino Reto</div>
  <div class="label email">Email</div>
  <div class="label section-label">Sua semana</div>
</div>
</body>
</html>
