<!-- @dsCard group="Components" viewport="700x420" name="FullScreen" subtitle="Full-screen flow with header + fixed footer" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);padding:18px;font-family:var(--forge-font-body);color:var(--forge-text);}
  .stage{position:relative;height:380px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:var(--forge-radius-button);font-family:var(--forge-font-body);font-weight:800;cursor:pointer;background:var(--forge-accent);color:var(--forge-on-accent);box-sizing:border-box;}
  .btn.sm{height:var(--forge-size-control-sm);padding-inline:13px;font-size:12.5px;}
  .btn.lg{height:var(--forge-size-control-lg);padding-inline:18px;font-size:15px;}
  .fs{position:absolute;inset:0;background:var(--forge-bg);display:flex;flex-direction:column;}
  .head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:var(--forge-border-w) solid var(--forge-divider);}
  .close{background:none;border:none;color:var(--forge-text-muted);font-size:18px;cursor:pointer;margin-left:-6px;min-width:var(--forge-tap-target-min);min-height:var(--forge-tap-target-min);}
  .title{flex:1;font-family:var(--forge-font-title);font-weight:700;font-size:var(--forge-text-panel-title);color:var(--forge-text);text-transform:uppercase;letter-spacing:var(--forge-tracking-title);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .content{flex:1;overflow:auto;padding:18px;}
  .content p{color:var(--forge-text-dim);font-size:13px;margin:0;}
  .foot{border-top:var(--forge-border-w) solid var(--forge-divider);padding:12px 18px 16px;background:var(--forge-bg);}
</style>
</head>
<body>
<div class="stage">
  <button class="btn sm">Abrir FullScreen</button>
  <div class="fs" role="dialog" aria-modal="true">
    <div class="head">
      <button class="close" aria-label="Fechar">✕</button>
      <div class="title">Editar plano</div>
    </div>
    <div class="content"><p>Conteúdo do fluxo em tela cheia.</p></div>
    <div class="foot"><button class="btn lg">Salvar</button></div>
  </div>
</div>
</body>
</html>
