<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--forge-bg);padding:20px;font-family:var(--font-body)}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Panel, FullScreen, Button } = window.ForgeDesignSystem_7731a5;
function Demo() {
  const [panel, setPanel] = React.useState(true);
  const [full, setFull] = React.useState(false);
  return (
    <div style={{ position: "relative", height: 360 }}>
      <div style={{ display: "flex", gap: 10 }}>
        <Button small title="Abrir Panel" onClick={() => setPanel(true)} />
        <Button small title="Abrir FullScreen" onClick={() => setFull(true)} />
      </div>
      <div style={{ position: "absolute", inset: 0 }}>
        <Panel visible={panel} onClose={() => setPanel(false)} title="Treino de hoje" footer={<Button title="Pronto" onClick={() => setPanel(false)} />}>
          <div style={{ color: "var(--forge-text-dim)", fontSize: 13, lineHeight: 1.6, paddingBottom: 12 }}>Escolha qualquer treino pra fazer hoje.</div>
        </Panel>
        <FullScreen visible={full} onClose={() => setFull(false)} title="Editar plano" footer={<Button title="Salvar" onClick={() => setFull(false)} />}>
          <div style={{ color: "var(--forge-text-dim)", fontSize: 13 }}>Conteúdo do fluxo em tela cheia.</div>
        </FullScreen>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
