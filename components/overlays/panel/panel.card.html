<!-- @dsCard group="Components" viewport="700x420" name="Panel" subtitle="Centered modal panel with scrim" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);padding:18px;font-family:var(--forge-font-body);color:var(--forge-text);}
  .stage{position:relative;height:380px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:var(--forge-radius-button);font-family:var(--forge-font-body);font-weight:800;cursor:pointer;background:var(--forge-accent);color:var(--forge-on-accent);box-sizing:border-box;}
  .btn.sm{height:var(--forge-size-control-sm);padding-inline:13px;font-size:12.5px;}
  .btn.lg{height:var(--forge-size-control-lg);padding-inline:18px;font-size:15px;}
  .scrim{position:absolute;inset:0;background:var(--forge-scrim);display:flex;align-items:center;justify-content:center;padding:14px;box-sizing:border-box;}
  .panel{background:var(--forge-panel);border-radius:var(--forge-radius-panel);border:var(--forge-border-w) solid var(--forge-border);width:100%;max-width:440px;max-height:100%;display:flex;flex-direction:column;box-sizing:border-box;}
  .head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;}
  .title{flex:1;font-family:var(--forge-font-title);font-weight:700;font-size:var(--forge-text-panel-title);color:var(--forge-text);text-transform:uppercase;letter-spacing:var(--forge-tracking-title);}
  .close{background:none;border:none;color:var(--forge-text-muted);font-size:18px;cursor:pointer;min-width:var(--forge-tap-target-min);min-height:var(--forge-tap-target-min);}
  .content{padding:0 18px 4px;}
  .content p{color:var(--forge-text-dim);font-size:13px;line-height:1.6;padding-bottom:12px;margin:0;}
  .foot{padding:0 18px 16px;}
</style>
</head>
<body>
<div class="stage">
  <button class="btn sm">Abrir Panel</button>
  <div class="scrim">
    <div class="panel" role="dialog" aria-modal="true">
      <div class="head">
        <div class="title">Treino de hoje</div>
        <button class="close" aria-label="Fechar">✕</button>
      </div>
      <div class="content"><p>Escolha qualquer treino pra fazer hoje.</p></div>
      <div class="foot"><button class="btn lg">Pronto</button></div>
    </div>
  </div>
</div>
</body>
</html>
