<!-- @dsCard group="Components" viewport="700x260" name="Forms" subtitle="TextField, QtyInput" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);padding:20px;font-family:var(--forge-font-body);color:var(--forge-text);}
  .box{display:flex;flex-direction:column;gap:12px;max-width:320px;}
  .lbl{color:var(--forge-text-faint);font-size:var(--forge-text-label);text-transform:uppercase;letter-spacing:var(--forge-tracking-label);font-weight:700;margin-bottom:6px;}
  .field{height:44px;display:flex;align-items:center;padding-inline:12px;border-radius:var(--forge-radius-input);border:1px solid var(--forge-border-input);background:var(--forge-surface-raised);font-size:var(--forge-text-input);}
  .field.ml{height:auto;min-height:64px;align-items:flex-start;padding:12px;}
  .ph{color:var(--forge-text-dim);}
  .qty{display:inline-flex;align-items:center;gap:8px;}
  .qval{height:44px;min-width:64px;display:flex;align-items:center;justify-content:center;border-radius:var(--forge-radius-input);border:1px solid var(--forge-border-input);background:var(--forge-surface-raised);font-family:var(--forge-font-title);font-weight:700;font-size:20px;font-variant-numeric:tabular-nums;}
  .unit{height:44px;padding-inline:14px;display:inline-flex;align-items:center;border-radius:var(--forge-radius-input);border:1px solid var(--forge-accent);background:var(--forge-accent);color:var(--forge-on-accent);font-weight:700;font-size:var(--forge-text-chip);}
  .unit.off{background:var(--forge-surface-raised);border-color:var(--forge-border-input);color:var(--forge-text-dim);}
</style>
</head>
<body>
<div class="box">
  <div><div class="lbl">Email</div><div class="field">voce@email.com</div></div>
  <div><div class="lbl">Notas</div><div class="field ml"><span class="ph">Observações do treino…</span></div></div>
  <div>
    <div class="lbl">Quantidade</div>
    <div class="qty"><span class="qval">150</span><span class="unit">g</span><span class="unit off">fatia</span></div>
  </div>
</div>
</body>
</html>
