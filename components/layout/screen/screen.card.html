<!-- @dsCard group="Components" viewport="700x260" name="Screen" subtitle="Standalone screen wrapper (outside module shell)" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);font-family:var(--forge-font-body);color:var(--forge-text);}
  .root{height:240px;border:1px dashed var(--forge-border);overflow:hidden;display:flex;}
  .screen{flex:1;background:var(--forge-bg);display:flex;flex-direction:column;padding:16px;box-sizing:border-box;}
  .label{color:var(--forge-text-faint);font-size:11px;text-transform:uppercase;letter-spacing:1px;font-family:var(--forge-font-body);font-weight:700;}
  .title{font-family:var(--forge-font-title);font-size:22px;text-transform:uppercase;letter-spacing:var(--forge-tracking-title);color:var(--forge-text);margin-top:6px;}
</style>
</head>
<body>
<div class="root">
  <div class="screen">
    <div class="label">Screen (fora do módulo)</div>
    <div class="title">Boot</div>
  </div>
</div>
</body>
</html>
