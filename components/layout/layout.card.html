<!-- @dsCard group="Components" viewport="700x260" name="Layout" subtitle="Screen, ScreenBody" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);font-family:var(--forge-font-body);color:var(--forge-text);}
  .split{display:flex;gap:1px;height:240px;}
  .frame{flex:1;border:1px dashed var(--forge-border);overflow:hidden;display:flex;flex-direction:column;}
  .screen{flex:1;background:var(--forge-bg);display:flex;flex-direction:column;padding:16px;box-sizing:border-box;}
  .screen-body{flex:1;overflow:hidden;padding:8px var(--forge-space-screen-h) 24px;box-sizing:border-box;}
  .label{font-family:var(--forge-font-body);font-weight:700;font-size:var(--forge-text-label);text-transform:uppercase;letter-spacing:var(--forge-tracking-label);color:var(--forge-text-faint);}
  .title{font-family:var(--forge-font-title);font-weight:700;text-transform:uppercase;letter-spacing:var(--forge-tracking-title);color:var(--forge-text);font-size:var(--forge-text-panel-title);line-height:var(--forge-lh-panel-title);margin-top:6px;}
</style>
</head>
<body>
<div class="split">
  <div class="frame">
    <div class="screen">
      <div class="label">Screen (fora do módulo)</div>
      <div class="title">Boot</div>
    </div>
  </div>
  <div class="frame">
    <div class="screen-body">
      <div class="label">ScreenBody (dentro do módulo)</div>
      <div class="title">Hoje</div>
    </div>
  </div>
</div>
</body>
</html>
