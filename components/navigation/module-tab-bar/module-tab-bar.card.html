<!-- @dsCard group="Components" viewport="700x110" name="ModuleTabBar" subtitle="Bottom tab bar, module-scoped accent" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);font-family:var(--forge-font-body);color:var(--forge-text);}
  .tabbar{display:flex;background:var(--forge-panel);border-top:var(--forge-border-w) solid var(--forge-divider);padding-top:8px;padding-bottom:max(8px,env(safe-area-inset-bottom));padding-inline:4px;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:44px;padding-block:2px;background:none;border:none;cursor:pointer;}
  .tab .lbl{font-family:var(--forge-font-body);font-weight:700;font-size:11px;}
  .tab.on{color:var(--forge-accent);}
  .tab.off{color:var(--forge-text-dim);}
  svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>
<div class="tabbar" role="tablist">
  <button class="tab on" role="tab" aria-selected="true" aria-label="Hoje">
    <svg width="22" height="22" viewBox="0 0 24 24"><line x1="4" y1="9" x2="4" y2="15"/><line x1="7" y1="7" x2="7" y2="17"/><line x1="17" y1="7" x2="17" y2="17"/><line x1="20" y1="9" x2="20" y2="15"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
    <span class="lbl">Hoje</span>
  </button>
  <button class="tab off" role="tab" aria-selected="false" aria-label="Treinos">
    <svg width="22" height="22" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span class="lbl">Treinos</span>
  </button>
  <button class="tab off" role="tab" aria-selected="false" aria-label="Progresso">
    <svg width="22" height="22" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span class="lbl">Progresso</span>
  </button>
</div>
</body>
</html>
