<!-- @dsCard group="Components" viewport="700x420" name="Navigation" subtitle="AppHeader, ModuleTabBar, ModuleHeader" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);font-family:var(--forge-font-body);color:var(--forge-text);}
  svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  /* AppHeader */
  .hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--forge-divider);}
  .brand{display:flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;padding:0;}
  .mark{width:26px;height:26px;object-fit:contain;}
  .word{font-family:var(--forge-font-title);font-weight:700;font-size:22px;letter-spacing:var(--forge-tracking-title);text-transform:uppercase;color:var(--forge-text);}
  .word .i{color:var(--forge-accent);}
  .actions{display:flex;align-items:center;gap:4px;}
  .ibtn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;}

  /* ModuleHeader */
  .mh{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;}
  .mh .left{min-width:0;flex:1;}
  .eyebrow{font-family:var(--forge-font-body);font-weight:700;font-size:12px;letter-spacing:var(--forge-tracking-eyebrow);text-transform:uppercase;color:var(--forge-text-faint);margin-bottom:4px;}
  .title{font-family:var(--forge-font-title);font-weight:700;text-transform:uppercase;letter-spacing:var(--forge-tracking-title);color:var(--forge-text);font-size:var(--forge-text-screen-title);line-height:var(--forge-lh-screen-title);margin:0;}
  .btn-sm{height:var(--forge-size-control-sm);padding-inline:13px;border-radius:var(--forge-radius-button);border:none;background:var(--forge-success);color:var(--forge-on-light);font-family:var(--forge-font-body);font-weight:800;font-size:12.5px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}

  /* ModuleTabBar */
  .tabbar{display:flex;background:var(--forge-panel);border-top:var(--forge-border-w) solid var(--forge-divider);padding-top:8px;padding-bottom:max(8px,env(safe-area-inset-bottom));padding-inline:4px;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:44px;padding-block:2px;background:none;border:none;cursor:pointer;}
  .tab .lbl{font-family:var(--forge-font-body);font-weight:700;font-size:11px;}
  .tab.on{color:var(--forge-accent);}
  .tab.off{color:var(--forge-text-dim);}
</style>
</head>
<body>
<div>
  <div class="hdr">
    <button class="brand" aria-label="Voltar aos módulos">
      <img class="mark" src="../../assets/forge-mark.png" alt="">
      <span class="word"><span class="i">F</span>orge</span>
    </button>
    <div class="actions">
      <button class="ibtn" aria-label="Voltar aos módulos"><svg width="20" height="20" viewBox="0 0 24 24" style="color:var(--forge-text-muted)"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg></button>
      <button class="ibtn" aria-label="Sair da conta"><svg width="19" height="19" viewBox="0 0 24 24" style="color:var(--forge-text-faint)"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>

  <div style="padding:18px;">
    <div class="mh">
      <div class="left">
        <div class="eyebrow">Terça · 11/07/2026</div>
        <h1 class="title">Hoje</h1>
      </div>
      <button class="btn-sm">Ajustar</button>
    </div>
  </div>

  <div class="tabbar" role="tablist">
    <button class="tab on" role="tab" aria-selected="true" aria-label="Hoje">
      <svg width="22" height="22" viewBox="0 0 24 24"><line x1="4" y1="9" x2="4" y2="15"/><line x1="7" y1="7" x2="7" y2="17"/><line x1="17" y1="7" x2="17" y2="17"/><line x1="20" y1="9" x2="20" y2="15"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
      <span class="lbl">Hoje</span>
    </button>
    <button class="tab off" role="tab" aria-selected="false" aria-label="Treinos">
      <svg width="22" height="22" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span class="lbl">Treinos</span>
    </button>
    <button class="tab off" role="tab" aria-selected="false" aria-label="Progresso">
      <svg width="22" height="22" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="lbl">Progresso</span>
    </button>
  </div>
</div>
</body>
</html>
