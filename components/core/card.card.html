<!-- @dsCard group="Components" viewport="700x220" name="Card" subtitle="Base surface card, with and without accent stripe" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--forge-bg);padding:20px;font-family:var(--forge-font-body);color:var(--forge-text);}
  .stack{display:flex;flex-direction:column;}
  .card{display:flex;background:var(--forge-surface);border-radius:var(--forge-radius-card);border:var(--forge-border-w) solid var(--forge-border);overflow:hidden;margin-bottom:var(--forge-space-card-gap);width:100%;box-sizing:border-box;}
  .stripe{width:4px;flex-shrink:0;background:var(--forge-accent);}
  .body{flex:1;min-width:0;padding:var(--forge-space-card);}
  .body.striped{padding:var(--forge-space-12);}
  .title{color:var(--forge-text);font-family:var(--forge-font-title);font-size:20px;text-transform:uppercase;letter-spacing:var(--forge-tracking-title);font-weight:700;}
  .sub{color:var(--forge-text-dim);font-size:13px;margin-top:6px;}
</style>
</head>
<body>
<div class="stack">
  <div class="card">
    <div class="body">
      <div class="title">Supino Reto</div>
      <div class="sub">4 séries · 8-10 reps</div>
    </div>
  </div>
  <div class="card">
    <div class="stripe"></div>
    <div class="body striped">
      <div class="title">Treino A</div>
      <div class="sub">Com faixa de acento lateral</div>
    </div>
  </div>
</div>
</body>
</html>
